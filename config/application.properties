# =============================================================================
# DataMigrationFramework — External Configuration Template
# =============================================================================
# Place this file (or a copy of it) in one of the following locations relative
# to the JAR to override the built-in defaults:
#
#   ./config/application.properties   <-- recommended (this file)
#   ./application.properties
#
# Any property set here takes priority over the bundled application.properties.
# Individual properties can also be overridden via environment variables or
# command-line arguments — see "Configuration Methods" in the README.
# =============================================================================


# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------

# HTTP port the API listens on.
# Default: 9390
server.port=9390

# Disable the Spring Boot startup banner (useful in production/CI).
# spring.main.banner-mode=off


# -----------------------------------------------------------------------------
# CORS — allowed browser origins for the REST API
# -----------------------------------------------------------------------------

# Comma-separated list of origins that may call the API from a browser.
# Add your production frontend URL here when deploying.
# Default: http://localhost:5176,http://localhost:5173
cors.allowed-origins=http://localhost:5176,http://localhost:5173

cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600


# -----------------------------------------------------------------------------
# Migration performance tuning
# -----------------------------------------------------------------------------

# Number of documents sent to MarkLogic per HTTP request (per writer thread).
# Increase for larger average document sizes; decrease if you hit HTTP timeouts.
# Default: 1000
migration.marklogic.batcher.batch-size=1000

# Number of parallel HTTP writer threads per migration partition.
# Keep at or below the number of MarkLogic app-server threads available.
# Default: 4
migration.marklogic.batcher.thread-count=4


# -----------------------------------------------------------------------------
# Schema introspection — excluded schema names (regex)
# -----------------------------------------------------------------------------

# Pipe-separated regex of schema names to exclude from introspection.
# Default excludes common system schemas for all supported databases.
schemacrawler.schema.pattern.exclude=dbo|sys|SYS|SYSTEM|pg_catalog|information_schema


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Root log level. Set to DEBUG for verbose output; ERROR for production silence.
# logging.level.root=WARN

# Framework service classes (migration, generation)
logging.level.com.nativelogix.data.migration.framework.service=INFO

# Spring Batch job/step lifecycle
logging.level.org.springframework.batch=WARN

# MarkLogic WriteBatcher internals (batch dispatch, retries)
logging.level.com.marklogic.client.datamovement=INFO

# MarkLogic HTTP layer — very verbose; only enable for connection debugging
logging.level.com.marklogic.client=WARN
