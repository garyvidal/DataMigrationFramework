server.port=9390
#logging.level.root=TRACE
#logging.level.org.springframework.web=TRACE

# Migration tuning — cursor pipeline
# Root rows per queue slot and per child-fetch batch
migration.pipeline.batch-size=2000
# Document-builder worker threads (0 = auto, uses available CPU count)
migration.pipeline.worker-threads=48
# BlockingQueue capacity between producer and workers (slots × batch-size = max rows in-flight)
migration.pipeline.queue-capacity=32
# Documents per HTTP request sent by each WriteBatcher worker thread
migration.marklogic.batcher.batch-size=1500
# Parallel HTTP writer threads in the shared WriteBatcher
migration.marklogic.batcher.thread-count=24

# Migration logging
# Spring Batch job/step lifecycle (RUNNING, COMPLETED, FAILED, chunk counts)
logging.level.org.springframework.batch=INFO
# Spring Batch SQL (job metadata queries against H2) set DEBUG to see SQL
logging.level.org.springframework.batch.core.repository.dao=WARN

# MarkLogic DMSDK WriteBatcher internals (batch dispatch, retries, thread activity)
#logging.level.com.marklogic.client.datamovement=DEBUG
# MarkLogic Java Client HTTP layer (request/response details) very verbose
logging.level.com.marklogic.client=INFO

# Migration service and reader/writer classes
logging.level.com.nativelogix.data.migration.framework.service.migration=DEBUG
logging.level.com.nativelogix.data.migration.framework.service=DEBUG

# CORS configuration
cors.allowed-origins=http://localhost:5176,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Spring Batch - use H2 in-memory DB for job metadata only
spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Schema Crawler exclude schemas
schemacrawler.schema.pattern.exclude=dbo|sys|SYS|SYSTEM|pg_catalog|information_schema

# Actuator / Micrometer metrics
# Expose health, info, metrics (JSON), and prometheus (scrape endpoint)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
# Tag all metrics with the application name (Spring Boot 3 syntax)
management.observations.key-values.application=DataMigrationFramework
