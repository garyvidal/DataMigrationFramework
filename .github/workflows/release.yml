name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: garyvidal/DataMigrationFramework-Web
          path: frontend

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build
        run: mvn -B package -DskipTests -Dfrontend.workingDirectory=frontend/app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DataMigrationFramework ${{ github.ref_name }}
          generate_release_notes: true
          files: target/DataMigrationFramework-${{ steps.version.outputs.VERSION }}.jar
